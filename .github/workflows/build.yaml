name: build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-mcpb:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: "pnpm"
      - uses: flatt-security/setup-takumi-guard-npm@9a5d797c2085b6326d3a2985c08e3a114b9b88c1 # v1.1.1
        with:
          bot-id: ${{ !github.event.pull_request.head.repo.fork && secrets.TAKUMI_GUARD_BOT_ID || '' }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:mcpb
      - uses: actions/upload-artifact@v6
        with:
          path: build/kintone-mcp-server.mcpb
          name: kintone-mcp-server.mcpb
          retention-days: 3

  build-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: "pnpm"
      - uses: flatt-security/setup-takumi-guard-npm@9a5d797c2085b6326d3a2985c08e3a114b9b88c1 # v1.1.1
        with:
          bot-id: ${{ !github.event.pull_request.head.repo.fork && secrets.TAKUMI_GUARD_BOT_ID || '' }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm pack
      - uses: actions/upload-artifact@v6
        with:
          path: "kintone-mcp-server-*.tgz"
          name: kintone-mcp-server.tgz
          retention-days: 3
